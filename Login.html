<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Transformers Login</title>
  <link rel="stylesheet" href="Login.css">
</head>
<body>

<div class="login-wrapper">

  <div class="gallery robot">
    <img src="https://transforverse.eu/cdn/shop/files/OptimusAgeOfExtinctionStudioSeries_1.jpg?v=1775229068&width=2040" class="corner top-left">
    <img src="https://transforverse.eu/cdn/shop/files/Megatronus_Prime_transformers_age_of_the_primes_4.jpg?crop=center&height=1200&v=1751012543&width=1200" class="corner top-right">
    <img src="https://transforverse.eu/cdn/shop/files/SentinelPrimeStudioSeriesTransformersOne_5.jpg?v=1753204764&width=2040" class="corner bottom-right">
    <img src="https://transforverse.eu/cdn/shop/files/FigurinesTransformersQueStudioSeriesDotm_7.jpg?crop=center&height=1200&v=1751545523&width=1200" class="corner bottom-left">
    <img src="https://transforverse.eu/cdn/shop/files/OptimusPrimestudioseriesRiseOfTheBeastsTransformers_3.jpg?v=1751012688&width=20400" class="main-img">
  </div>

  <div class="auth-box">
    <h2>✨ Welcome The Transformers' Reviewer</h2>

    <input type="text" id="username" placeholder="Tên đăng nhập">
    <input type="password" id="password" placeholder="Mật khẩu">

    <button onclick="login()">Đăng nhập</button>
    <button onclick="register()">Đăng ký</button>

    <p id="msg" style="color: #ff4d4d; margin-top: 10px; font-size: 14px;"></p>
  </div>

  <div class="gallery vehicle">
    <img src="https://transforverse.eu/cdn/shop/files/SSAOEOPT2.jpg?crop=center&height=1200&v=1775229068&width=1200" class="corner top-left">
    <img src="https://transforverse.eu/cdn/shop/files/AOTPMegatronus2.jpg?crop=center&height=1200&v=1751012543&width=1200" class="corner top-right">
    <img src="https://transforverse.eu/cdn/shop/files/SentinelAlt.jpg?crop=center&height=1200&v=1753204764&width=1200" class="corner bottom-right">
    <img src="https://transforverse.eu/cdn/shop/files/FigurinesTransformersQueStudioSeriesDotm_1.jpg?crop=center&height=1200&v=1751545523&width=1200" class="corner bottom-left">
    <img src="https://toysnowman.com/cdn/shop/files/G0536AS00_detail_24_2000px_300DPI.jpg?v=1730166641&width=800" class="main-img">
  </div>

</div>


<script type="module" src="auth.js"></script>



</body>
</html>
